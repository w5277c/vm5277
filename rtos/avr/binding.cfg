#class.method path.function regs
#regs: reg,reg,reg,...(reg: 16-31.16-31....)
#features: feature,feature,...
#RowFormat:Class.Method [cgfunc|]AsmFilePathThrowsDot:FunctionLabel:regs[:dirtyRegs] [OSFeatures]
#cgfunc - использование реализации CodeGenerator'а(только для констант)
#dirtyRegs - регистры через запятую, не используемые в результате и аргументах, изменяемые в вызываемом коде (для сохранения на уровне вызывающего)

#Внимательно с пробелами - используются как разделители блоков

#Поддерживаются массивы - для любого массива компилятор сгенерирует short(2 байта) указывающие на начало данных массива и short(2 байта) его длины
#в сигнатуре метода длина должна идти следующим аргументом после массива)

#TODO вызывающая функция портит регистры которые используются для передачи аргументов - это ее зона ответственности,
# но кроме этого вызываемая функция так-же может портить другие регистры (не восстанавливая их), имеет постфикс _nr
# для таких функций нужно ввести еще один набор параметров - указывающий какие еще регистры нужно сохранять при вызове и восстанавливать при возвращении.

