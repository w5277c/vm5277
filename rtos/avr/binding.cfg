####rtos.thread
	# Нативные методы интерфейса, без аргументов, но ожидают ссылку вызывающего
	Thread.start(this)				core.dispatcher.asm:os_task_start_nr:16.17		#this передается не явно, на верхнем уровне этот аргумент указывать не нужно
	Thread.stop(this)				core.dispatcher.asm:os_task_stop_nr:16.17
	Thread.isAlive(this)			core.dispatcher.asm:os_task_is_alive:16.17		#Нет запроса на останов
	Thread.isStopped(this)			core.dispatcher.asm:os_task_is_stopped:16.17	#Нить завершила свою работу
	# Статические методы интерфейса
	Thread.sleep()					core.wait.asm:os_wait
	Thread.sleepSeconds(short)		core.wait_s.asm:os_wait_s:16.17
	Thread.sleep(short)				core.wait_ms.asm:os_wait_ms:16.17

####rtos.Timer
	# Нативные методы интерфейса, без аргументов, но ожидают ссылку вызывающего
	Timer.start(this,short)			core.dispatcher.asm:os_timer_start_nr:16.17,18.19	#this передается не явно, на верхнем уровне этот аргумент указывать не нужно
	Timer.stop(this)				core.dispatcher.asm:os_task_stop_nr:16.17
	Timer.isAlive(this)			    core.dispatcher.asm:os_task_is_alive:16.17		#Нет запроса на останов
	Timer.isStopped(this)			core.dispatcher.asm:os_task_is_stopped:16.17	#Нить завершила свою работу

